<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidRun Cyberpunk WebGL</title>

    <!-- Import Cyberpunk Styles -->
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="pad.css">

    <style>
        body {
            margin: 0;
            background-color: #000;
            color: var(--colors-primary--500);
            font-family: var(--fonts-primary);
            overflow: hidden; /* Prevent scrolling behind the game */
        }

        /* Matrix Canvas Layer */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Unity Game Container Layer */
        .game-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 2rem;
            box-sizing: border-box;
        }

        /* Wrap standard Unity canvas in the cyberpunk Pad UI */
        #unity-container {
            width: 960px; /* Default Unity WebGL width */
            height: 600px; /* Default Unity WebGL height */
            background-color: #000;
        }
        
        #unity-canvas {
            width: 100%;
            height: 100%;
            display: block; /* removes bottom margin gap */
        }    </style>
</head>
<body>

    <!-- Matrix Rain Background -->
    <canvas id="matrixCanvas"></canvas>

    <!-- Centered Game Container -->
    <div class="game-wrapper">
        <!-- The Pad container generates the neon notch border -->
        <div class="pad">
            <div class="pad__body" style="padding: 0;">
                
                <!-- Unity Container (Drop Unity build here) -->
                <div id="unity-container">
                    <!-- Example placeholder for Unity WebGL Canvas -->
                    <canvas id="unity-canvas" style="background: #222;"></canvas>
                </div>

            </div>
        </div>
    </div>

    <!-- Matrix Script -->
    <script src="matrix.js"></script>

    <!-- Unity Build Scripts Will Go Here -->
    <!-- <script src="Build/UnityLoader.js"></script> -->
    <!-- <script> var unityInstance = UnityLoader.instantiate("unity-container", "Build/VoidRun.json"); </script> -->

</body>
</html>
